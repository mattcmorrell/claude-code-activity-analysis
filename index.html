// Blended cost per million tokens (based on known in/out ratios from /stats)
// Opus 4.5/4.6: $5/M in, $25/M out — ~94% output → $23.84/M blended
// Sonnet 4.5/4.6: $3/M in, $15/M out — ~73% output → $11.76/M blended
// Haiku 4.5: $1/M in, $5/M out — ~50% output → $3.00/M blended
const COST_PER_M = {
  'sonnet-4-5': 11.76,
  'opus-4-5':   23.84,
  'haiku-4-5':   3.00,
  'opus-4-6':   23.84,
  'sonnet-4-6': 11.76,
};

// Cost mode: 'api' = full API billing (fresh + cache), 'fresh' = fresh tokens only
let costMode = 'api';

// All-time cache totals at 5m TTL (from modelUsage)
const TOTAL_CACHE_WRITE_COST = 1207.94;
const TOTAL_CACHE_READ_COST  = 2490.32;
const TOTAL_CACHE_COST       = TOTAL_CACHE_WRITE_COST + TOTAL_CACHE_READ_COST;

function modelCost(model, tokens) {
  return (tokens / 1_000_000) * (COST_PER_M[model] || 0);
}

function dayCostFresh(date) {
  const models = tokenData[date] || {};
  return Object.entries(models).reduce((sum, [m, t]) => sum + modelCost(m, t), 0);
}

// Precompute total fresh cost across all dates (used for cache allocation)
const _totalFreshAllDays = allDates.reduce((s, d) => s + dayCostFresh(d), 0);

// Cache cost allocation: 60% proportional to fresh tokens, 40% equal across active days.
// The equal component ensures low-fresh-token days (design sprint) still show cache bars,
// reflecting that cache reads happened even when very little new text was generated.
function dayCacheAllocationFactor(date) {
  const proportional = _totalFreshAllDays > 0 ? dayCostFresh(date) / _totalFreshAllDays : 0;
  const equal = 1 / allDates.length;
  return 0.6 * proportional + 0.4 * equal;
}

function dayCostAPI(date) {
  return dayCostFresh(date) + dayCacheAllocationFactor(date) * TOTAL_CACHE_COST;
}

function dayCost(date) {
  return costMode === 'api' ? dayCostAPI(date) : dayCostFresh(date);
}

function fmtCost(c) {

const BREAKDOWN_COLORS = {
  plain:      '#818cf8',
  task:       '#fb923c',
  playwright: '#34d399',
  figma:      '#a78bfa',
  web:        '#60a5fa',
};
const BREAKDOWN_LABELS = {
  plain:      'Plain coding',
  task:       'Task agents (subagents)',
  playwright: 'Playwright MCP (screenshot-heavy)',
  figma:      'Figma MCP',
  web:        'Web search/fetch',
};

function fmt(n) {
  if (n >= 1000000) return (n/1000000).toFixed(2) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'k';
  return n.toString();
}

function fmtDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

function renderSummary() {
  const totalMsgs = Object.values(activityData).reduce((a, d) => a + d.messages, 0);
  const totalSessions = Object.values(activityData).reduce((a, d) => a + d.sessions, 0);
  const totalTokens = Object.values(tokenData).reduce((a, d) => a + Object.values(d).reduce((x,y)=>x+y,0), 0);
  const totalFresh = allDates.reduce((sum, d) => sum + dayCostFresh(d), 0);

  const stats = [
    { label: 'Active Days',      value: Object.keys(activityData).length },
    { label: 'Total Messages',   value: fmt(totalMsgs) },
    { label: 'Total Tokens',     value: fmt(totalTokens) },
    { label: 'Total Sessions',   value: totalSessions },
    { label: 'Est. API Cost',    value: '$3,914',                         sub: 'cache + fresh · 5m TTL',     tipId: 'tip-api',
      tip: 'What you\'d pay under Anthropic API billing:\n\nFresh tokens:   $216\nCache writes:  $1,208  (at 5m TTL)\nCache reads:   $2,490\n──────────────────────\nTotal:          $3,914\n\nCache costs come from every message\nre-reading your full session context.\nNot visible in /cost output.' },
    { label: 'Fresh Cost Only',  value: '$' + totalFresh.toFixed(0),      sub: '~18× less than API billing', tipId: 'tip-fresh',
      tip: 'Only counts new text generated or sent.\nCache reads and writes excluded.\n\nThis is what Claude Code\'s /cost\ncommand reports. It looks manageable\n— but the actual API bill is ~18×\nhigher because cache reads are billed\nseparately on every message.' },
  ];

  document.getElementById('summary-row').innerHTML = stats.map(s => `
    <div class="stat-card" style="position:relative">
      <div class="stat-label">${s.label}${s.tipId ? `<span class="info-icon" onclick="toggleCardTip(event,'${s.tipId}')">i</span>` : ''}</div>
      <div class="stat-value">${s.value}</div>
      ${s.sub ? `<div class="stat-sub">${s.sub}</div>` : ''}
      ${s.tip ? `<div class="card-tip" id="${s.tipId}">${s.tip}</div>` : ''}
    </div>
  `).join('');
}

function setMetric(metric) {
  currentMetric = metric;
  document.querySelectorAll('.toggle-btn').forEach((b, i) => {
    b.classList.toggle('active', ['cost','messages','tokens','breakdown','tools','sessions'][i] === metric);
  });
  const titles = {
    messages:  'Messages per Day',
    tokens:    'Tokens per Day (stacked by model)',
    cost:      'Cost per Day',
    breakdown: 'Session Breakdown — where is the activity?',
    tools:     'Tool Calls per Day',
    sessions:  'Sessions per Day',
  };
  document.getElementById('chart-title').textContent = titles[metric];
  document.getElementById('cost-mode-row').classList.toggle('visible', metric === 'cost');
  renderChart();
  renderInsight();
}

function toggleCardTip(event, tipId) {
  event.stopPropagation();
  const tip = document.getElementById(tipId);
  const isVisible = tip.classList.contains('visible');
  document.querySelectorAll('.card-tip').forEach(t => t.classList.remove('visible'));
  if (!isVisible) tip.classList.add('visible');
}

document.addEventListener('click', () => {
  document.querySelectorAll('.card-tip').forEach(t => t.classList.remove('visible'));
});

function setCostMode(mode) {
  costMode = mode;
  document.getElementById('cost-btn-api').classList.toggle('active', mode === 'api');
  document.getElementById('cost-btn-fresh').classList.toggle('active', mode === 'fresh');
  document.getElementById('cost-mode-note').textContent = mode === 'api'
    ? 'incl. estimated cache reads & writes'
    : 'fresh tokens only — excludes cache costs';

  renderChart();
  renderInsight();
}

function renderChart() {
  const container = document.getElementById('chart');
  const W = container.clientWidth || 900;
  const H = 500;
  const mL = 58, mR = 20, mT = 30, mB = 52;
  const iW = W - mL - mR;
  const iH = H - mT - mB;

  // Determine which dates to show
  const dates = (currentMetric === 'tokens' || currentMetric === 'cost')
    ? allDates
    : Object.keys(currentMetric === 'breakdown' ? breakdownData : activityData).sort();

  const n = dates.length;
  const barW = Math.max(5, Math.floor(iW / (n + 4)) - 2);
  const barGap = Math.max(1, Math.floor((iW - barW * n) / (n - 1)));

  // Compute values
  let values, maxVal;
  if (currentMetric === 'tokens') {
    values = dates.map(d => Object.values(tokenData[d] || {}).reduce((a,b)=>a+b,0));
  } else if (currentMetric === 'cost') {
    values = dates.map(d => dayCost(d));
  } else if (currentMetric === 'breakdown') {
    values = dates.map(d => {
      const b = breakdownData[d] || {};
      return (b.plain||0) + (b.task||0) + (b.playwright||0) + (b.figma||0) + (b.web||0);
    });
  } else {
    const key = currentMetric === 'tools' ? 'tools' : currentMetric === 'sessions' ? 'sessions' : 'messages';
    values = dates.map(d => (activityData[d] || {})[key] || 0);
  }
  maxVal = Math.max(...values, 1);

  const yTicks = 5;
  const rawStep = maxVal / yTicks;
  const magnitude = Math.pow(10, Math.floor(Math.log10(rawStep)));
  const yStep = Math.ceil(rawStep / magnitude) * magnitude;
  const yMax = yStep * yTicks;

  function xPos(i) { return mL + i * (barW + barGap); }
  function yPos(val) { return mT + iH - (val / yMax) * iH; }
  function barH(val) { return (val / yMax) * iH; }

  let svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;

  // Grid lines
  for (let i = 0; i <= yTicks; i++) {
    const y = mT + iH - (i / yTicks) * iH;
    svg += `<line class="grid-line" x1="${mL}" y1="${y}" x2="${mL + iW}" y2="${y}" />`;
    const tickLabel = currentMetric === 'cost' ? fmtCost(i * yStep) : fmt(i * yStep);
    let yAxisColor = '#999';
    if (currentMetric === 'cost' && costMode === 'api') {
      const t = i / yTicks; // 0 = bottom, 1 = top
      const r = Math.round(153 + t * (249 - 153));
      const g = Math.round(153 + t * (115 - 153));
      const b = Math.round(153 + t * (22  - 153));
      yAxisColor = `rgb(${r},${g},${b})`;
    }
    svg += `<text class="axis-label" x="${mL - 6}" y="${y + 4}" text-anchor="end" style="fill:${yAxisColor}">${tickLabel}</text>`;
  }

  // Month separators
  let lastMonth = null;
  dates.forEach((d, i) => {
    const month = d.substring(0, 7);
    if (month !== lastMonth) {
      const x = xPos(i);
      const label = new Date(d + 'T12:00:00').toLocaleDateString('en-US', { month: 'short' });
      svg += `<line stroke="#2a2a2e" stroke-width="1" x1="${x}" y1="${mT}" x2="${x}" y2="${mT + iH + 8}" />`;
      svg += `<text class="month-label" x="${x + 4}" y="${mT + iH + 22}">${label}</text>`;
      lastMonth = month;
    }
  });

  // Bars
  if (currentMetric === 'breakdown') {
    const bdOrder = ['plain', 'task', 'figma', 'playwright', 'web'];
    dates.forEach((d, i) => {
      const x = xPos(i);
      const b = breakdownData[d] || {};
      let yOffset = mT + iH;
      bdOrder.forEach(cat => {
        const val = b[cat] || 0;
        if (!val) return;
        const h = barH(val);
        yOffset -= h;
        svg += `<rect class="bar" x="${x}" y="${yOffset}" width="${barW}" height="${h}" rx="1"
          fill="${BREAKDOWN_COLORS[cat]}" opacity="0.85"
          onmouseenter="showTip(event,'${d}')" onmouseleave="hideTip()" />`;
      });
    });
  } else if (currentMetric === 'tokens' || currentMetric === 'cost') {
    const modelOrder = ['sonnet-4-5', 'opus-4-5', 'haiku-4-5', 'sonnet-4-6', 'opus-4-6'];
    dates.forEach((d, i) => {
      const x = xPos(i);
      const models = tokenData[d] || {};
      let yOffset = mT + iH;

      if (currentMetric === 'cost' && costMode === 'api') {
        // API billing view: cache read (top, purple) + cache write (middle, orange) + fresh by model (bottom, bright)
        const cacheFactor = dayCacheAllocationFactor(d);
        const readH = barH(cacheFactor * TOTAL_CACHE_READ_COST);
        if (readH > 0.3) {
          yOffset -= readH;
          svg += `<rect class="bar" x="${x}" y="${yOffset}" width="${barW}" height="${readH}" rx="1"
            fill="#c084fc" opacity="0.55"
            onmouseenter="showTip(event,'${d}')" onmouseleave="hideTip()" />`;
        }
        const writeH = barH(cacheFactor * TOTAL_CACHE_WRITE_COST);
        if (writeH > 0.3) {
          yOffset -= writeH;
          svg += `<rect class="bar" x="${x}" y="${yOffset}" width="${barW}" height="${writeH}" rx="1"
            fill="#fb923c" opacity="0.6"
            onmouseenter="showTip(event,'${d}')" onmouseleave="hideTip()" />`;
        }
        // Single solid bar for fresh tokens (no model breakdown in API view)
        const freshH = barH(dayCostFresh(d));
        if (freshH > 0.3) {
          yOffset -= freshH;
          svg += `<rect class="bar" x="${x}" y="${yOffset}" width="${barW}" height="${freshH}" rx="1"
            fill="#60a5fa" opacity="0.95"
            onmouseenter="showTip(event,'${d}')" onmouseleave="hideTip()" />`;
        }
      } else {
        // Tokens view or fresh-only cost: stacked by model
        modelOrder.forEach(m => {
          const raw = models[m] || 0;
          if (!raw) return;
          const segVal = currentMetric === 'cost' ? modelCost(m, raw) : raw;
          const h = barH(segVal);
          if (h < 0.5) return;
          yOffset -= h;
          svg += `<rect class="bar" x="${x}" y="${yOffset}" width="${barW}" height="${h}" rx="1"
            fill="${MODEL_COLORS[m]}" opacity="0.85"
            onmouseenter="showTip(event,'${d}')" onmouseleave="hideTip()" />`;
        });
      }
    });
  } else {
    dates.forEach((d, i) => {
      const val = values[i];
      if (!val) return;
      const x = xPos(i);
      const h = barH(val);
      const y = yPos(val);
      svg += `<rect class="bar" x="${x}" y="${y}" width="${barW}" height="${h}" rx="2"
        fill="${BAR_COLOR}" opacity="0.85"
        onmouseenter="showTip(event,'${d}')" onmouseleave="hideTip()" />`;
    });
  }

  // Cache-efficiency region annotation (Tokens + Cost views only)
  if (currentMetric === 'tokens' || currentMetric === 'cost') {
    const gapStart = dates.findIndex(d => d >= '2026-02-13');
    const gapEnd   = dates.findLastIndex(d => d <= '2026-03-02');
    if (gapStart >= 0 && gapEnd >= gapStart) {
      const rx1 = xPos(gapStart) - barGap / 2;
      const rx2 = xPos(gapEnd) + barW + barGap / 2;
      const rw  = rx2 - rx1;
      const ry  = mT;
      const rh  = iH;
      const mid = rx1 + rw / 2;

      // Shaded band
      svg += `<rect x="${rx1}" y="${ry}" width="${rw}" height="${rh}" fill="#ffffff" opacity="0.025" rx="3"/>`;
      // Top bracket
      svg += `<line stroke="#555" stroke-width="1" x1="${rx1+2}" y1="${ry+6}" x2="${rx1+2}" y2="${ry+16}" />`;
      svg += `<line stroke="#555" stroke-width="1" x1="${rx1+2}" y1="${ry+6}" x2="${mid - 90}" y2="${ry+6}" />`;
      svg += `<line stroke="#555" stroke-width="1" x1="${rx2-2}" y1="${ry+6}" x2="${rx2-2}" y2="${ry+16}" />`;
      svg += `<line stroke="#555" stroke-width="1" x1="${rx2-2}" y1="${ry+6}" x2="${mid + 90}" y2="${ry+6}" />`;
      // Label lines
      const label1 = 'Low fresh tokens ≠ low activity';
      const label2 = 'Design sprint ran on cached context.';
      const label3 = (currentMetric === 'cost' && costMode === 'api') ? 'Cache costs estimated proportionally.' : '5.7B cache reads not visible here.';
      svg += `<text font-family="inherit" font-size="11" fill="#aaa" text-anchor="middle" x="${mid}" y="${ry + 22}">${label1}</text>`;
      svg += `<text font-family="inherit" font-size="11" fill="#777" text-anchor="middle" x="${mid}" y="${ry + 36}">${label2}</text>`;
      svg += `<text font-family="inherit" font-size="11" fill="#777" text-anchor="middle" x="${mid}" y="${ry + 50}">${label3}</text>`;
    }
  }

  // Annotations (only on dates present in current view)
  annotations.forEach(ann => {
    const idx = dates.indexOf(ann.date);
    if (idx < 0) return;
    const x = xPos(idx) + barW / 2;
    const val = values[idx] || 0;
    const yTop = yPos(val) - 8;
    const lines = ann.label.split('\n');
    const lineH = 12;
    const totalH = lines.length * lineH + 4;
    svg += `<line stroke="${ann.color}" stroke-width="1" stroke-dasharray="2,2" x1="${x}" y1="${yTop - totalH - 2}" x2="${x}" y2="${yTop}" opacity="0.5" />`;
    lines.forEach((line, li) => {
      svg += `<text class="annotation" x="${x}" y="${yTop - totalH + li * lineH}" fill="${ann.color}" opacity="1">${line}</text>`;
    });
  });

  // X axis labels (sparse)
  const labelEvery = Math.ceil(n / 10);
  dates.forEach((d, i) => {
    if (i % labelEvery !== 0 && i !== n - 1) return;
    const x = xPos(i) + barW / 2;
    const label = new Date(d + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    svg += `<text class="axis-label" x="${x}" y="${mT + iH + 40}" text-anchor="middle">${label}</text>`;
  });

  svg += '</svg>';
  container.innerHTML = svg;

  // Legend
  const legendEl = document.getElementById('legend');
  if (currentMetric === 'tokens') {
    const modelOrder = ['sonnet-4-5', 'opus-4-5', 'haiku-4-5', 'sonnet-4-6', 'opus-4-6'];
    legendEl.innerHTML = modelOrder.map(m => `
      <div class="legend-item">
        <div class="legend-dot" style="background:${MODEL_COLORS[m]}"></div>
        ${MODEL_LABELS[m]}
      </div>`).join('');
  } else if (currentMetric === 'cost') {
    const modelOrder = ['sonnet-4-5', 'opus-4-5', 'haiku-4-5', 'sonnet-4-6', 'opus-4-6'];
    let html;
    if (costMode === 'api') {
      html = `
        <div class="legend-item"><div class="legend-dot" style="background:#818cf8"></div>Fresh tokens &nbsp;<span style="color:#777">$216 total</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#fb923c;opacity:0.8"></div>Cache writes &nbsp;<span style="color:#777">~$1,208</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#c084fc;opacity:0.8"></div>Cache reads &nbsp;<span style="color:#777">~$2,490</span></div>
        <span style="color:#777;font-size:11px;margin-left:8px">· cache distributed 60% by token volume + 40% equally across active days</span>`;
    } else {
      html = modelOrder.map(m => `
        <div class="legend-item">
          <div class="legend-dot" style="background:${MODEL_COLORS[m]}"></div>
          ${MODEL_LABELS[m]} <span style="color:#777">${fmtCost(COST_PER_M[m])}/M blended</span>
        </div>`).join('');
    }
    legendEl.innerHTML = html;
  } else if (currentMetric === 'breakdown') {
    const bdOrder = ['plain', 'task', 'figma', 'playwright', 'web'];
    legendEl.innerHTML = bdOrder.map(cat => `
      <div class="legend-item">
        <div class="legend-dot" style="background:${BREAKDOWN_COLORS[cat]}"></div>
        ${BREAKDOWN_LABELS[cat]}
      </div>`).join('')
      + `<span style="color:#888;font-size:11px;margin-left:8px">· session counts by type — Playwright screenshots &amp; Task agents are the biggest token multipliers</span>`;
  } else {
    legendEl.innerHTML = '';
  }
}

function showTip(e, date) {
  const a = activityData[date] || {};
  const t = tokenData[date] || {};
  const totalTok = Object.values(t).reduce((a,b)=>a+b,0);
  const tip = document.getElementById('tooltip');

  const b = breakdownData[date] || {};
  let rows = `<div class="tooltip-date">${fmtDate(date)}</div>`;
  if (a.messages !== undefined) {
    rows += `<div class="tooltip-row"><span class="tooltip-key">Messages</span><span class="tooltip-val">${a.messages.toLocaleString()}</span></div>`;
    rows += `<div class="tooltip-row"><span class="tooltip-key">Tool Calls</span><span class="tooltip-val">${a.tools.toLocaleString()}</span></div>`;
    rows += `<div class="tooltip-row"><span class="tooltip-key">Sessions</span><span class="tooltip-val">${a.sessions}</span></div>`;
  }

## The Cache Gap — The Hidden Cost

### What prompt caching is

Claude Code sends the entire conversation history and project context with every message. For a long coding session, that context can be 50,000–200,000 tokens. Anthropic's prompt cache stores this context server-side and charges a reduced rate on re-reads instead of full input pricing.

Cache writes happen when context is first stored. Cache reads happen every subsequent message that reuses it.

### Why the gap is so large

| Token category | Total tokens | API cost |
|---|---|---|
| Fresh input | 1.55M | $216 |
| Cache writes | 250M | $1,208–$1,933 |
| Cache reads | 5,701M | $2,490 |

**Cache reads alone are 367× more numerous than fresh input tokens.** The ratio makes sense: each session might create 50k–100k of cache writes once, then re-read that entire context on every subsequent message. A session with 50 messages re-reads 100k tokens 50 times = 5M cache read tokens from a single session.

### The math in plain terms

Say a typical Opus 4.6 session:
- You write 10 messages over 30 minutes
- Context grows to 80k tokens
- Each of your 10 messages reads the full 80k from cache
- Cache reads: 10 × 80k = 800k tokens × $0.50/M = **$0.40 for one session**
- Fresh output: ~2k tokens × $25/M = **$0.05**

That session costs ~$0.45 total — but the chart's cost tab shows only $0.05. The cache reads are 8× the visible cost.

Across 204 sessions on Opus 4.6, with an average context of ~1M tokens per session reread 18+ times (the Mar 13 peak alone had 18 sessions), the cache read bill compounds rapidly.

### Opus 4.6 is the dominant cost driver

Opus 4.6 accounts for 66% of total cost ($2,575 of $3,914 at 5m TTL). Its cache read line item alone ($1,787) is the single largest cost component. This is the combination of:
1. The highest cache-read rate ($0.50/M vs $0.30/M for Sonnet)
2. The highest usage volume (3.57 billion cache read tokens)
3. The longest average session context (heavy EE Graph + Panda Command work in March–April)

## Implications for API Billing

You are moving from Max (~$100/month flat) to API billing (pay-per-token). Based on this usage period, here is what to expect.

### Rough monthly projection at current usage intensity

The Jan 6 – Apr 7 period is ~92 days (3 months). Monthly estimate:

| | Per month |
|---|---|
| Fresh tokens | $72 |
| Cache writes | $403–$644 |
| Cache reads | $830 |
| **Monthly total** | **~$1,305–$1,546** |

This assumes similar usage intensity. March was heavier than January; April appears to be tapering. Real monthly cost will vary significantly with project phase.

### The biggest levers

**1. Model selection is the highest-impact decision.**
Swapping from Opus 4.6 to Sonnet 4.6 for a session cuts the cache read rate from $0.50/M to $0.30/M — a 1.7× reduction on reads, plus Opus input/output rates are also higher. For tasks that don't require Opus-level reasoning (UI polish, documentation, test writing, refactoring), Sonnet 4.6 returns comparable results at meaningfully lower cost.

**2. Playwright screenshots are expensive at scale.**
Each screenshot is ~5–15k tokens added to context, then re-read on every subsequent message. At $0.50/M (Opus 4.6 cache read rate), a screenshot that persists through 20 messages costs $0.05–$0.15 by itself. Sessions with heavy screenshot review loops (like Feb 9's 45 calls) can cost $1–3 in cache reads alone.

**3. Task agents multiply cache writes.**
Each subagent creates its own context window and cache write. On high-task-agent days (Mar 13: 7 sessions), cache write costs spike. Reserve task agents for genuinely parallelizable work.

**4. Long sessions with large codebases are the core cost driver.**
The 3.57 billion Opus 4.6 cache read tokens represent many long sessions on large projects (EE Graph with 1,200+ nodes, Panda Command with 14 design variants). Keeping context windows smaller — starting fresh sessions more often, using \`/compact\` — is the most direct way to reduce cache read accumulation.

|---|---|---|
| Jan–Apr 2026 actual spend | ~$600 | ~$3,914–$4,639 |
| Value ratio | | **6.5–7.7×** |

The Max plan absorbed ~$3,300–$4,000 in cache costs that would have appeared as line items under API billing. This will be the primary sticker shock in the transition.

> **Billing mechanics caveat:** Max included usage is not billed per-token — it operates as a rate-limited subscription with five-hour reset windows. "Extra usage" (optional over-limit continuation) is billed at standard API rates. If you transition to an API key, Claude Code charges from the first token regardless of Max subscription status. These API-equivalent figures are the relevant baseline for that scenario.

function parseMarkdown(md) {
  const lines = md.split('\n');
  let html = '';
  let inTable = false, inUl = false, inOl = false, inBlockquote = false, inCode = false;

  function closeAll() {
    if (inTable)      { html += '</tbody></table>'; inTable = false; }
    if (inUl)         { html += '</ul>'; inUl = false; }
    if (inOl)         { html += '</ol>'; inOl = false; }
    if (inBlockquote) { html += '</blockquote>'; inBlockquote = false; }
  }

  function inline(s) {
    return s
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/`([^`]+)`/g,'<code>$1</code>')
      .replace(/\[([^\]]+)\]\([^)]+\)/g,'$1');
  }

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    if (line.startsWith('```')) { inCode = !inCode; html += inCode ? '<pre><code>' : '</code></pre>'; continue; }
    if (inCode) { html += line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '\n'; continue; }

    if (line.startsWith('---')) { closeAll(); html += '<hr>'; continue; }

    if (line.startsWith('### ')) { closeAll(); html += `<h3>${inline(line.slice(4))}</h3>`; continue; }
    if (line.startsWith('## '))  { closeAll(); html += `<h2>${inline(line.slice(3))}</h2>`; continue; }
    if (line.startsWith('# '))   { closeAll(); html += `<h1>${inline(line.slice(2))}</h1>`; continue; }

    if (line.startsWith('> ')) {
      if (!inBlockquote) { closeAll(); html += '<blockquote>'; inBlockquote = true; }
      html += `<p>${inline(line.slice(2))}</p>`; continue;
    } else if (inBlockquote && line.trim() === '') {
      html += '</blockquote>'; inBlockquote = false; continue;
    }

    if (line.startsWith('|')) {
      const cells = line.split('|').slice(1,-1).map(c => c.trim());
      if (cells.every(c => /^[-: ]+$/.test(c))) continue; // separator row
      if (!inTable) {
        closeAll();
        html += '<table><thead><tr>' + cells.map(c=>`<th>${inline(c)}</th>`).join('') + '</tr></thead><tbody>';
        inTable = true;
      } else {
        html += '<tr>' + cells.map(c=>`<td>${inline(c)}</td>`).join('') + '</tr>';
      }
      continue;
    } else if (inTable) { html += '</tbody></table>'; inTable = false; }

    if (/^[-*] /.test(line)) {
      if (!inUl) { closeAll(); html += '<ul>'; inUl = true; }
      html += `<li>${inline(line.slice(2))}</li>`; continue;
    } else if (inUl && line.trim() !== '') { /* allow continuation */ }
    else if (inUl) { html += '</ul>'; inUl = false; }

    if (/^\d+\. /.test(line)) {
      if (!inOl) { closeAll(); html += '<ol>'; inOl = true; }
      html += `<li>${inline(line.replace(/^\d+\. /,''))}</li>`; continue;
    } else if (inOl && line.trim() !== '') { /* allow continuation */ }
    else if (inOl) { html += '</ol>'; inOl = false; }

    if (line.trim() === '') { closeAll(); continue; }

    if (!inUl && !inOl) html += `<p>${inline(line)}</p>`;
  }
  closeAll();
  return html;
}

// Extract summary paragraphs (between "## Summary" and the next "##" or "---")
// Show first ~2 sentences of the Summary paragraph as plain text preview
const summaryMatch = MD_SOURCE.match(/## Summary\n\n([\s\S]+?)(?=\n\n\*\*You were|$)/);
const summaryProse = summaryMatch
  ? summaryMatch[1].replace(/\*\*/g,'').replace(/`/g,'').trim()
  : '';
document.getElementById('report-preview').textContent = summaryProse;

// Full report rendered (lazy — only parsed once on first open)
let reportRendered = false;
let reportOpen = false;
function toggleReport(e) {
  e.preventDefault();
  reportOpen = !reportOpen;
  if (reportOpen && !reportRendered) {
    document.getElementById('report-body').innerHTML = parseMarkdown(MD_SOURCE);
    reportRendered = true;
  }
  document.getElementById('report-full').style.display = reportOpen ? 'block' : 'none';
  document.getElementById('report-preview').style.display = reportOpen ? 'none' : 'block';
  document.getElementById('report-toggle').textContent = reportOpen ? 'Hide full report' : 'Show full report';
}

function downloadReport() {
  const blob = new Blob([MD_SOURCE], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Matt-Morrell-Claude-Usage.md';
  a.click();
  URL.revokeObjectURL(a.href);
}
</script>
